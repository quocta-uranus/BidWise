<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Xác thực Email - BidWise</title>
</head>
<body style="font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; padding: 20px;">
  <div style="max-width: 480px; margin: 0 auto; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08);">
    <div style="background: #0057FF; padding: 24px; text-align: center;">
      <h1 style="color: #fff; margin: 0; font-size: 24px;">BidWise</h1>
    </div>
    <div style="padding: 32px 24px;">
      <h2 style="color: #111; margin-top: 0;">Xác thực địa chỉ email</h2>
      <p style="color: #555; line-height: 1.6;">Xin chào <strong>{{fullName}}</strong>,</p>
      <p style="color: #555; line-height: 1.6;">Mã OTP xác thực email của bạn là:</p>
      <div style="text-align: center; margin: 24px 0;">
        <span style="font-size: 36px; font-weight: bold; letter-spacing: 8px; color: #0057FF; background: #EEF3FF; padding: 12px 24px; border-radius: 8px;">{{otp}}</span>
      </div>
      <p style="color: #555; line-height: 1.6;">Mã này có hiệu lực trong <strong>10 phút</strong> và chỉ sử dụng một lần.</p>
      <p style="color: #999; font-size: 13px;">Nếu bạn không đăng ký tài khoản BidWise, vui lòng bỏ qua email này.</p>
    </div>
    <div style="background: #f9f9f9; padding: 16px 24px; text-align: center; color: #999; font-size: 12px;">
      &copy; 2026 BidWise. All rights reserved.
    </div>
  </div>
</body>
</html>
