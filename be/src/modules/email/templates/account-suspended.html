<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Tài khoản bị tạm khóa - BidWise</title>
</head>
<body style="font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; padding: 20px;">
  <div style="max-width: 480px; margin: 0 auto; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08);">
    <div style="background: #DC2626; padding: 24px; text-align: center;">
      <h1 style="color: #fff; margin: 0; font-size: 24px;">BidWise</h1>
    </div>
    <div style="padding: 32px 24px;">
      <h2 style="color: #111; margin-top: 0;">Tài khoản bị tạm khóa</h2>
      <p style="color: #555; line-height: 1.6;">Xin chào <strong>{{fullName}}</strong>,</p>
      <p style="color: #555; line-height: 1.6;">Tài khoản BidWise của bạn đã bị tạm khóa vì lý do sau:</p>
      <div style="background: #FEF2F2; border-left: 4px solid #DC2626; padding: 12px 16px; margin: 16px 0; border-radius: 0 4px 4px 0;">
        <p style="color: #B91C1C; margin: 0; font-weight: 500;">{{reason}}</p>
      </div>
      <p style="color: #555; line-height: 1.6;">Nếu bạn cho rằng đây là nhầm lẫn, vui lòng liên hệ với chúng tôi qua email support@bidwise.vn.</p>
    </div>
    <div style="background: #f9f9f9; padding: 16px 24px; text-align: center; color: #999; font-size: 12px;">
      &copy; 2026 BidWise. All rights reserved.
    </div>
  </div>
</body>
</html>
